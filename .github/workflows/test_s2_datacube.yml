name: Test S2 DATACUBE

on:
  push:
    paths:
        - 'scripts/test_s2_datacube.py'
        - '.github/workflows/test_s2_datacube.yml'
        - 'requirements_s2.txt'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  test-s2-datacube:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_s2.txt

      - name: Set OTel env
        run: |
          echo "OTEL_ENDPOINT=https://otel.infra.eodc.eu/v1/metrics" >> $GITHUB_ENV
          echo "OTEL_API_KEY=${{ secrets.OTEL_API_KEY }}" >> $GITHUB_ENV

      - name: Run HDA Test
        run: python scripts/test_hda.py

      - name: Run S2 STAC Test
        run: python scripts/test_s2_stac.py

      - name: Run S2 DATACUBE Test
        run: python scripts/test_s2_datacube.py

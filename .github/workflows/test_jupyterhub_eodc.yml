name: Test EODC JupyterHub

on:
  push:
    paths:
        - 'scripts/test_jupyterhub.py'   
  schedule:
    - cron: "*/30 * * * *" 
  workflow_dispatch: 

jobs:
  test-eodc-jupyterhub:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set env
        run: |
          echo "URL=https://hub.services.eodc.eu" >> $GITHUB_ENV
          echo "USER=${{ secrets.EODC_USER }}" >> $GITHUB_ENV
          echo "TOKEN=${{ secrets.EODC_TOKEN }}" >> $GITHUB_ENV
          echo "SERVICE=jupyterhub-eodc" >> $GITHUB_ENV
          echo "SERVICE_WS=hub.services.eodc.eu" >> $GITHUB_ENV
          echo "OTEL_ENDPOINT=https://otel.infra.eodc.eu/v1/metrics" >> $GITHUB_ENV
          echo "OTEL_API_KEY=${{ secrets.OTEL_API_KEY }}" >> $GITHUB_ENV

      - name: Test EODC JupyterHub
        continue-on-error: true
        run: python scripts/test_jupyter.py
